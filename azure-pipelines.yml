trigger:
  branches:
    include:
    - main

pr:
  branches:
    include:
    - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'bank-core-sc'

stages:
- stage: PR_Validation
  displayName: 'PR Validation (Terraform Plan)'
  condition: eq(variables['Build.Reason'], 'PullRequest')
  jobs:
  - job: Terraform_Plan
    displayName: 'Terraform Init & Plan'
    steps:
    - checkout: self
    
    # ----------------------------------------------------------------
    - script: |
        wget -q https://releases.hashicorp.com/terraform/1.8.0/terraform_1.8.0_linux_amd64.zip
        unzip -q terraform_1.8.0_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
        terraform --version
      displayName: 'Install Terraform'
    # -----------------------------------------------------------------

    - task: AzureCLI@2
      displayName: 'Run Terraform Plan'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo "Starting Terraform Plan for DEV environment..."
          cd environments/dev
          terraform init
          terraform validate
          terraform plan