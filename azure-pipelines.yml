trigger:
  branches:
    include:
    - main

pr:
  branches:
    include:
    - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'bank-core-sc'

stages:
# =========================================================
# STAGE 1: PR VALIDATION (Terraform Plan)
# =========================================================
- stage: PR_Validation
  displayName: 'PR Validation (Terraform Plan)'
  condition: eq(variables['Build.Reason'], 'PullRequest')
  jobs:
  - job: Terraform_Plan
    displayName: 'Terraform Init & Plan'
    steps:
    - checkout: self
    - script: |
        wget -q https://releases.hashicorp.com/terraform/1.8.0/terraform_1.8.0_linux_amd64.zip
        unzip -q terraform_1.8.0_linux_amd64.zip
        sudo mv terraform /usr/local/bin/
      displayName: 'Install Terraform'

    - task: AzureCLI@2
      displayName: 'Run Terraform Plan'
      inputs:
        azureSubscription: $(azureServiceConnection)
        addSpnToEnvironment: true 
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_OIDC_TOKEN=$idToken
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          export ARM_USE_OIDC=true
          
          cd environments/dev
          terraform init
          terraform validate
          terraform plan

# =========================================================
# STAGE 2: DEPLOY (Terraform Apply)
# =========================================================
- stage: Deploy_Dev
  displayName: 'Deploy to DEV'
  # Condition: Run ONLY when triggered by a merge/push to main branch
  dependsOn: []
  condition: and(eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - deployment: Apply_Dev
    displayName: 'Apply DEV Environment'
    environment: 'dev' # Registers this deployment in ADO Environments
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - script: |
              wget -q https://releases.hashicorp.com/terraform/1.8.0/terraform_1.8.0_linux_amd64.zip
              unzip -q terraform_1.8.0_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
            displayName: 'Install Terraform'

          - task: AzureCLI@2
            displayName: 'Run Terraform Apply'
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Setting up Terraform Authentication..."
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_OIDC_TOKEN=$idToken
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_USE_OIDC=true
                
                cd environments/dev
                terraform init
                
                # The crucial part: auto-approve so it doesn't wait for human input
                echo "Running Terraform Apply..."
                terraform apply -auto-approve
      
# =========================================================
# STAGE 3: DEPLOY TO TEST
# =========================================================
- stage: Deploy_Test
  displayName: 'Deploy to TEST'
  # Това е магията: Чака Deploy_Dev да приключи и се изпълнява САМО ако е бил успешен
  dependsOn: Deploy_Dev
  condition: succeeded('Deploy_Dev')
  jobs:
  - deployment: Apply_Test
    displayName: 'Apply TEST Environment'
    environment: 'test' 
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - script: |
              wget -q https://releases.hashicorp.com/terraform/1.8.0/terraform_1.8.0_linux_amd64.zip
              unzip -q terraform_1.8.0_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
            displayName: 'Install Terraform'

          - task: AzureCLI@2
            displayName: 'Run Terraform Apply for Test'
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Setting up Terraform Authentication..."
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_OIDC_TOKEN=$idToken
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_USE_OIDC=true
                
                # Влизаме директно в папката за test
                cd environments/test
                terraform init
                
                echo "Running Terraform Apply for Test..."
                terraform apply -auto-approve